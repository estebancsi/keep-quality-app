name: Build and Publish Angular App

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
env:
  REPO: ghcr.io/${{github.repository}}

jobs:
  create-docker-image:
    runs-on: ubuntu-latest

    steps:
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get package name
        id: package-name
        run: echo "IMAGE_NAME=${REPO@L}" >> "${GITHUB_ENV}"

      - name: Get version
        id: package-version
        run: echo "VERSION=$(npm pkg get version | tr -d '"')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_CD }}

      - name: Build the Docker image
        run: |
          docker build \
          --tag ${{ env.IMAGE_NAME }}:latest \
          --tag ${{ env.IMAGE_NAME }}:${{ env.VERSION }} \
          .

      - name: Push Container as latest
        run: docker push ${{ env.IMAGE_NAME }}:latest

      - name: Push Container as version
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.VERSION }}

