@if (field(); as f) {
  <div class="type-config">
    <h3 class="text-md font-medium text-gray-900 mb-3">Long Text Configuration</h3>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Rows</label>
        <input
          type="number"
          [(ngModel)]="f.config.rows"
          (blur)="updateField()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.resizable"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Resizable</span>
      </label>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.showCharacterCount"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Show character count</span>
      </label>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.richText"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Enable rich text</span>
      </label>
    </div>
  </div>
}
