@if (field(); as f) {
  <div class="type-config">
    <h3 class="text-md font-medium text-gray-900 mb-3">Date Configuration</h3>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Date Format</label>
        <input
          type="text"
          [(ngModel)]="f.config.dateFormat"
          (blur)="updateField()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="YYYY-MM-DD"
        />
      </div>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.showCalendar"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Show calendar picker</span>
      </label>
    </div>
  </div>
}
