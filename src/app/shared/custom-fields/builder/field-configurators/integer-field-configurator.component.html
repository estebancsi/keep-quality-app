@if (field(); as f) {
  <div class="type-config">
    <h3 class="text-md font-medium text-gray-900 mb-3">Number Configuration</h3>
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Min Value</label>
          <input
            type="number"
            [(ngModel)]="f.config.minValue"
            (blur)="updateField()"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Max Value</label>
          <input
            type="number"
            [(ngModel)]="f.config.maxValue"
            (blur)="updateField()"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Step</label>
        <input
          type="number"
          [(ngModel)]="f.config.step"
          (blur)="updateField()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.showSpinButtons"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Show spin buttons</span>
      </label>
    </div>
  </div>
}
