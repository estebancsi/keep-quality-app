@if (field(); as f) {
  <div class="type-config">
    <h3 class="text-md font-medium text-gray-900 mb-3">Text Field Configuration</h3>
    <div class="space-y-3">
      <div>
        <label for="input-type" class="block text-sm font-medium text-gray-700 mb-1"
          >Input Type</label
        >
        <select
          id="input-type"
          [(ngModel)]="f.config.inputType"
          (change)="updateField()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="TEXT">Text</option>
          <option value="EMAIL">Email</option>
          <option value="URL">URL</option>
          <option value="PHONE">Phone</option>
          <option value="PASSWORD">Password</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="min-length" class="block text-sm font-medium text-gray-700 mb-1"
            >Min Length</label
          >
          <input
            id="min-length"
            type="number"
            [(ngModel)]="f.config.minLength"
            (blur)="updateField()"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label for="max-length" class="block text-sm font-medium text-gray-700 mb-1"
            >Max Length</label
          >
          <input
            id="max-length"
            type="number"
            [(ngModel)]="f.config.maxLength"
            (blur)="updateField()"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.showCharacterCount"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Show character count</span>
      </label>

      <div>
        <label for="suggestion-template" class="block text-sm font-medium text-gray-700 mb-1"
          >Suggestion Template</label
        >
        <textarea
          id="suggestion-template"
          [(ngModel)]="f.config.template"
          (blur)="updateField()"
          rows="3"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
          placeholder="e.g. Please explain why {{ 'item.name' }} failed."
        ></textarea>
        <p class="text-xs text-gray-500 mt-1">
          Use {{ '{{ placeholder }}' }} syntax for variables.
        </p>
      </div>
    </div>
  </div>
}
