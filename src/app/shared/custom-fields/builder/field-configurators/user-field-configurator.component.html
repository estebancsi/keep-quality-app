@if (field(); as f) {
  <div class="type-config">
    <h3 class="text-md font-medium text-gray-900 mb-3">User Configuration</h3>
    <div class="space-y-3">
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.allowMultiple"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Allow multiple users</span>
      </label>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Display Format</label>
        <select
          [(ngModel)]="f.config.displayFormat"
          (change)="updateField()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="NAME">Name Only</option>
          <option value="EMAIL">Email Only</option>
          <option value="NAME_EMAIL">Name and Email</option>
        </select>
      </div>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.searchable"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Searchable</span>
      </label>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.includeInactive"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Include inactive users</span>
      </label>
    </div>
  </div>
}
