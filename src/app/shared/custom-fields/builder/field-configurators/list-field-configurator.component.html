@if (field(); as f) {
  <div class="type-config">
    <h3 class="text-md font-medium text-gray-900 mb-3">List Configuration</h3>

    <!-- Options configuration -->
    <div class="mb-5">
      <div class="flex flex-row justify-between items-center mb-2">
        <span class="block text-sm font-medium text-gray-700">Options</span>
        <button
          type="button"
          (click)="addOption()"
          class="text-sm font-medium text-blue-600 hover:text-blue-800 focus:outline-none"
        >
          + Add Option
        </button>
      </div>

      <div class="space-y-2 max-h-60 overflow-y-auto pr-1">
        @for (option of f.config.options; track option.value; let i = $index) {
          <div
            class="flex items-center gap-2 p-2 border border-gray-200 rounded-md bg-white hover:border-gray-300 transition-colors"
          >
            <div class="shrink-0 flex items-center justify-center w-6">
              <input
                type="checkbox"
                [(ngModel)]="option.isDefault"
                (ngModelChange)="onDefaultChange(option, $event)"
                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer"
                title="Set as default"
              />
            </div>
            <div class="grow grid grid-cols-2 gap-2">
              <input
                type="text"
                [(ngModel)]="option.label"
                (blur)="updateField()"
                placeholder="Label"
                class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
              />
              <input
                type="text"
                [(ngModel)]="option.value"
                (blur)="updateField()"
                placeholder="Value"
                class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
              />
            </div>
            <button
              type="button"
              (click)="removeOption(i)"
              class="shrink-0 p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded transition-colors focus:outline-none"
              title="Remove option"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                />
              </svg>
            </button>
          </div>
        }
        @if (!f.config.options || f.config.options.length === 0) {
          <div
            class="text-sm text-gray-500 italic text-center py-4 border-2 border-dashed border-gray-200 rounded-md bg-gray-50"
          >
            No options defined. Click <span class="font-medium">"+ Add Option"</span> to create one.
          </div>
        }
      </div>
    </div>

    <div class="space-y-3">
      <label class="flex items-center">
        <input
          type="checkbox"
          [ngModel]="f.config.allowMultiple"
          (ngModelChange)="onAllowMultipleChange($event)"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Allow multiple selection</span>
      </label>
      <div>
        <span class="block text-sm font-medium text-gray-700 mb-1">Display Style</span>
        <select
          [(ngModel)]="f.config.displayStyle"
          (change)="updateField()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          @if (f.config.allowMultiple) {
            <option value="MULTISELECT">Multi-select List</option>
            <option value="CHECKBOX">Checkboxes</option>
          } @else {
            <option value="DROPDOWN">Dropdown</option>
            <option value="RADIO">Radio Buttons</option>
          }
        </select>
      </div>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.searchable"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Searchable</span>
      </label>
      <label class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="f.config.allowCustomValues"
          (change)="updateField()"
          class="mr-2"
        />
        <span class="text-sm text-gray-700">Allow custom values</span>
      </label>
    </div>
  </div>
}
